<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rahul Khan World - Uploader</title>
</head>
<body>
    <h1>Welcome to Rahul Khan World</h1>
    
    <input type="file" id="fileInput" accept="audio/mpeg">
    <button onclick="uploadTrack()">Upload Track</button>

    <hr>
    <h3>Available Tracks:</h3>
    <div id="trackList"></div> <br>
    <audio id="audioPlayer" controls><source id="audioSource" src=""></audio>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

        const firebaseConfig = { /* ... your config ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // 1. UPLOAD LOGIC
        window.uploadTrack = async function() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const storageRef = sRef(storage, 'music/' + file.name);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);

            // Save song info to database
            const songsRef = ref(db, 'songs');
            push(songsRef, { name: file.name, url: url });
        };

        // 2. DYNAMIC BUTTON GENERATION
        const songsRef = ref(db, 'songs');
        onValue(songsRef, (snapshot) => {
            const trackList = document.getElementById('trackList');
            trackList.innerHTML = ""; // Clear current list
            
            snapshot.forEach((childSnapshot) => {
                const song = childSnapshot.val();
                const btn = document.createElement("button");
                btn.innerText = song.name;
                btn.onclick = () => {
                    const audioPlayer = document.getElementById("audioPlayer");
                    document.getElementById("audioSource").src = song.url;
                    audioPlayer.load();
                    audioPlayer.play();
                };
                trackList.appendChild(btn);
            });
        });
    </script>
</body>
</html>
