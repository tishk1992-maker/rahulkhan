<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <p>This is my first hosted website.</p>

    <!-- Input for the track number and play button -->
    <input type="text" id="trackInput" placeholder="Enter track number">
    <button onclick="playTrack()">Play</button>

    <br><br>
    
    <!-- Audio player -->
    <audio id="audioPlayer" controls>
        <source id="audioSource" src="" type="audio/m4a">
        Your browser does not support the audio element.
    </audio>

    <script>
        function playTrack() {
            var trackNumber = document.getElementById("trackInput").value;
            var audioPlayer = document.getElementById("audioPlayer");
            var audioSource = document.getElementById("audioSource");
            
            // Constructs the file path (e.g., "1.mp3")
            audioSource.src = trackNumber + ".mp3";
            audioPlayer.load();
            audioPlayer.play();
        }
    </script>
</body>
</html>
