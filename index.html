<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rahul Khan World</title>
    <style>
        #trackButtons { margin-top: 20px; }
        button { padding: 15px 25px; margin: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Welcome to Rahul Khan World</h1>
    <p>Select a track. The player will sync in real-time for everyone:</p>

    <div id="trackButtons"></div>

    <br><br>

    <audio id="audioPlayer" controls>
        <source id="audioSource" src="" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD2H-Ccdm4fAq4qtgXqwVOAz4d7z115Ucw",
            authDomain: "rahulkhan-a4f12.firebaseapp.com",
            databaseURL: "https://rahulkhan-a4f12-default-rtdb.firebaseio.com",
            projectId: "rahulkhan-a4f12",
            storageBucket: "rahulkhan-a4f12.firebasestorage.app",
            messagingSenderId: "324760694486",
            appId: "1:324760694486:web:a57ca86603fd9911fc2377"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const trackRef = ref(db, 'currentTrack');

        // Create buttons 1-5
        const container = document.getElementById("trackButtons");
        for (let i = 1; i <= 5; i++) {
            const btn = document.createElement("button");
            btn.innerHTML = i;
            btn.onclick = () => set(trackRef, i.toString()); // Only write to DB
            container.appendChild(btn);
        }

        // Dedicated Listener: This runs automatically whenever the database changes
        onValue(trackRef, (snapshot) => {
            const trackNumber = snapshot.val();
            const audioPlayer = document.getElementById("audioPlayer");
            const audioSource = document.getElementById("audioSource");
            
            if (trackNumber) {
                const newSource = trackNumber + ".mp3";
                // Only update and play if it's a different track
                if (!audioSource.src.includes(newSource)) {
                    audioSource.src = newSource;
                    audioPlayer.load();
                    audioPlayer.play().catch(e => console.log("Auto-play blocked by browser policy"));
                }
            }
        });
    </script>
</body>
</html>
