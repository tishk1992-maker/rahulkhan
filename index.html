<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rahul Khan World</title>
    <style>
        #trackButtons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        button { padding: 15px 25px; cursor: pointer; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        button:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Welcome to Rahul Khan World</h1>
    <p>Selecting a track syncs it for everyone in real-time:</p>

    <div id="trackButtons"></div>

    <br><br>

    <audio id="audioPlayer" controls>
        <source id="audioSource" src="" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD2H-Ccdm4fAq4qtgXqwVOAz4d7z115Ucw",
            authDomain: "rahulkhan-a4f12.firebaseapp.com",
            databaseURL: "https://rahulkhan-a4f12-default-rtdb.firebaseio.com",
            projectId: "rahulkhan-a4f12",
            storageBucket: "rahulkhan-a4f12.firebasestorage.app",
            messagingSenderId: "324760694486",
            appId: "1:324760694486:web:a57ca86603fd9911fc2377"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const trackRef = ref(db, 'currentTrack');

        const audioPlayer = document.getElementById("audioPlayer");
        const audioSource = document.getElementById("audioSource");

        // 1. Create 10 buttons dynamically
        const container = document.getElementById("trackButtons");
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement("button");
            btn.innerHTML = "Track " + i;
            btn.onclick = () => set(trackRef, i.toString());
            container.appendChild(btn);
        }

        // 2. Real-time sync listener
        onValue(trackRef, (snapshot) => {
            const trackNumber = snapshot.val();
            if (!trackNumber) return;

            const newSource = trackNumber + ".mp3";

            // Only change and play if it's a new track
            if (audioSource.src.indexOf(newSource) === -1) {
                audioPlayer.pause();
                audioSource.src = newSource;
                audioPlayer.load();
                audioPlayer.play().catch(e => console.log("Playback interaction required"));
            } else {
                // If it's the SAME track button clicked again, just restart it
                audioPlayer.currentTime = 0;
                audioPlayer.play().catch(e => console.log("Playback error"));
            }
        });
    </script>
</body>
</html>
