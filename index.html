<!DOCTYPE html>
<html>
<head>
    <title>Rahul Khan World - Music Player</title>
</head>
<body>
    <h1>Welcome to Rahul Khan World</h1>
    <p>Select a track to play:</p>

    <div id="trackList">
        <button onclick="playTrack('track1')">Song One</button>
        <button onclick="playTrack('track2')">Song Two</button>
        <button onclick="playTrack('track3')">Song Three</button>
    </div>

    <br><br>
    
    <audio id="audioPlayer" controls>
        <source id="audioSource" src="" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "rahulkhan-a4f12.firebaseapp.com",
            databaseURL: "https://rahulkhan-a4f12-default-rtdb.firebaseio.com",
            projectId: "rahulkhan-a4f12",
            storageBucket: "rahulkhan-a4f12.firebasestorage.app",
            messagingSenderId: "324760694486",
            appId: "1:324760694486:web:a57ca86603fd9911fc2377"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const trackRef = ref(db, 'currentTrack');

        // This listener updates the audio source when the database changes
        onValue(trackRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const audioPlayer = document.getElementById("audioPlayer");
                const audioSource = document.getElementById("audioSource");
                audioSource.src = data + ".mp3"; 
                audioPlayer.load();
                audioPlayer.play();
            }
        });

        // Global function for buttons
        window.playTrack = function(trackName) {
            set(trackRef, trackName);
        }
    </script>
</body>
</html>
