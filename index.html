<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rahul Khan World</title>
</head>
<body>
    <h1>Welcome to Rahul Khan World</h1>
    <p>Click a track to play it:</p>

    <div id="trackButtons">
        <button onclick="updateTrack('1')">Play Track 1</button>
        <button onclick="updateTrack('2')">Play Track 2</button>
        <button onclick="updateTrack('3')">Play Track 3</button>
    </div>

    <br><br>

    <audio id="audioPlayer" controls>
        <source id="audioSource" src="" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD2H-Ccdm4fAq4qtgXqwVOAz4d7z115Ucw",
            authDomain: "rahulkhan-a4f12.firebaseapp.com",
            databaseURL: "https://rahulkhan-a4f12-default-rtdb.firebaseio.com",
            projectId: "rahulkhan-a4f12",
            storageBucket: "rahulkhan-a4f12.firebasestorage.app",
            messagingSenderId: "324760694486",
            appId: "1:324760694486:web:a57ca86603fd9911fc2377"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const trackRef = ref(db, 'currentTrack');

        // Logic for when you click a button
        window.updateTrack = function(trackNumber) {
            const audioPlayer = document.getElementById("audioPlayer");
            const audioSource = document.getElementById("audioSource");
            
            // Force reset: clear source then set new one
            audioPlayer.pause();
            audioSource.src = trackNumber + ".mp3";
            audioPlayer.load();
            audioPlayer.play().catch(e => console.log("Play error: ", e));
            
            // Sync with Firebase
            set(trackRef, trackNumber);
        };

        // Logic for others syncing to your play
        onValue(trackRef, (snapshot) => {
            const trackName = snapshot.val();
            const audioPlayer = document.getElementById("audioPlayer");
            const audioSource = document.getElementById("audioSource");
            
            // Only update if the current loaded track is different from the DB
            if (trackName && !audioSource.src.includes(trackName + ".mp3")) {
                audioSource.src = trackName + ".mp3";
                audioPlayer.load();
                audioPlayer.play().catch(e => console.log("Sync play error: ", e));
            }
        });
    </script>
</body>
</html>
