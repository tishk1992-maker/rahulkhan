<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rahul Khan World</title>
    <style>
        .button-row { margin-bottom: 10px; }
        .button-row button { margin: 2px; padding: 10px; }
    </style>
</head>
<body>
    <h1>Welcome to Rahul Khan World</h1>
    <p>Click a track to play it:</p>

    <div id="row1" class="button-row"></div>
    <div id="row2" class="button-row"></div>

    <br><br>

    <audio id="audioPlayer" controls>
        <source id="audioSource" src="" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD2H-Ccdm4fAq4qtgXqwVOAz4d7z115Ucw",
            authDomain: "rahulkhan-a4f12.firebaseapp.com",
            databaseURL: "https://rahulkhan-a4f12-default-rtdb.firebaseio.com",
            projectId: "rahulkhan-a4f12",
            storageBucket: "rahulkhan-a4f12.firebasestorage.app",
            messagingSenderId: "324760694486",
            appId: "1:324760694486:web:a57ca86603fd9911fc2377"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const trackRef = ref(db, 'currentTrack');

        // Function to create buttons
        function createButton(label, trackValue, containerId) {
            const btn = document.createElement("button");
            btn.innerHTML = label;
            btn.onclick = () => updateTrack(trackValue);
            document.getElementById(containerId).appendChild(btn);
        }

        // Generate the two rows
        for (let i = 1; i <= 5; i++) {
            createButton(i.toString(), i.toString(), "row1");
            createButton(i + "A", i.toString(), "row2");
        }

        window.updateTrack = function(trackNumber) {
            const audioPlayer = document.getElementById("audioPlayer");
            const audioSource = document.getElementById("audioSource");
            
            audioPlayer.pause();
            audioSource.src = trackNumber + ".mp3";
            audioPlayer.load();
            audioPlayer.play().catch(e => console.log("Play error: ", e));
            
            set(trackRef, trackNumber);
        };

        onValue(trackRef, (snapshot) => {
            const trackName = snapshot.val();
            const audioPlayer = document.getElementById("audioPlayer");
            const audioSource = document.getElementById("audioSource");
            
            if (trackName && !audioSource.src.includes(trackName + ".mp3")) {
                audioSource.src = trackName + ".mp3";
                audioPlayer.load();
                audioPlayer.play().catch(e => console.log("Sync play error: ", e));
            }
        });
    </script>
</body>
</html>
